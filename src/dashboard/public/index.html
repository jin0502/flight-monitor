<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shanghai Flight Monitor | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Shanghai Flight Monitor</h1>
            <div id="scan-status" class="badge badge-direct">System Active</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Top Flight Deal</div>
                <div id="stat-top-deal" class="stat-value">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Combinations</div>
                <div id="stat-total-combos" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Airports Monitored</div>
                <div id="stat-total-airports" class="stat-value">48</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Scan</div>
                <div id="stat-last-scan" class="stat-value">--</div>
            </div>
        </div>

        <section id="top-deals">
            <h2>🔥 Top Flight Combinations</h2>
            <div id="deals-container" class="combinations-grid">
                <div class="deal-card">Loading best deals...</div>
            </div>
        </section>

        <section id="one-way-browser">
            <h2>🌐 One-Way Results Browser</h2>
            <div class="data-table-container">
                <table id="flights-table">
                    <thead>
                        <tr>
                            <th>Route</th>
                            <th>Date</th>
                            <th>Price</th>
                            <th>Airline</th>
                            <th>Type</th>
                            <th>Scraped At</th>
                        </tr>
                    </thead>
                    <tbody id="flights-body">
                        <!-- Flights will be loaded here -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

</body>
</html>
